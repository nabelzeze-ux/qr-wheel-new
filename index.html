<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wayxbet - Xteam Pro Spin Wheel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0f1d;
            --accent-color: #00d2ff;
            --text-color: #ffffff;
            --card-border: rgba(0, 210, 255, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        /* حاوية اللعبة */
        .game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        /* العجلة */
        .wheel-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            max-width: 400px;
            margin: 0 auto;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            box-shadow: 0 0 20px var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #111827;
            transition: transform 1s ease-in-out;
        }

        .wheel-center {
            position: absolute;
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #0e1b2a, #1f2937);
            border-radius: 50%;
            border: 2px solid #fbbf24;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .wheel-center span {
            font-size: 14px;
            color: #fbbf24;
            font-weight: bold;
        }

        /* زر التدوير */
        .spin-button {
            margin-top: 30px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00d2ff, #0077ff);
            color: white;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            transition: all 0.3s;
        }

        .spin-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px var(--accent-color);
        }

        /* شبكة البطاقات */
        .cards-grid {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
            width: 100%;
        }

        .card-item {
            aspect-ratio: 1.5;
            background: linear-gradient(145deg, #1f2937, #374151);
            border: 2px solid var(--card-border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-color);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .card-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 15px var(--accent-color);
        }

        .card-item.revealed {
            background: #111827;
            color: #fbbf24;
            border-color: #fbbf24;
            cursor: default;
        }
