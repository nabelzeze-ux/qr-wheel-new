<body>

    <header>
        <h1>Xteam Pro</h1>
        <p>جرب حظك الآن مع Wayxbet</p>
    </header>

    <div class="game-container">
        <div class="wheel-arrow">▼</div>
        <div class="wheel-container" id="wheelContainer">
            <div class="wheel-center">
                <span style="font-size: 11px;">Xteam</span>
                <span style="font-size: 16px;">Pro</span>
            </div>
        </div>

        <button class="spin-button" id="spinBtn" onclick="startSpin()">🎰 تدوير العجلة</button>

        <div class="cards-grid" id="cardsGrid"></div>

        <div class="message" id="msgArea"></div>

        <button class="reset-btn" id="resetBtn" onclick="resetGame()">🔄 العب مجدداً</button>
    </div>

    <script>
        const prizes = [
            "5$", "10$", "50$", "100$", "250$", "حظ أوفر 🍀", "500 نقطة", "1,000 نقطة", "100,000 ل.س"
        ];

        let hasSpun = false;
        let canOpen = false;
        let isOpened = false;
        let currentRotation = 0;

        function startSpin() {
            if (hasSpun) {
                alert("لقد قمت بالتدوير مسبقاً!");
                return;
            }

            const wheel = document.getElementById("wheelContainer");
            const btn = document.getElementById("spinBtn");
            const msgArea = document.getElementById("msgArea");

            msgArea.innerText = "🎡 جاري التدوير... حظاً موفقاً!";
            wheel.classList.add("spinning");

            const extraSpins = 4 + Math.floor(Math.random() * 4);
            const randomAngle = Math.floor(Math.random() * 360);
            currentRotation += (extraSpins * 360) + randomAngle;

            wheel.style.transform = `rotate(${currentRotation}deg)`;
            btn.disabled = true;
            btn.style.opacity = "0.5";

            setTimeout(() => {
                wheel.classList.remove("spinning");
                hasSpun = true;
                canOpen = true;
                msgArea.innerText = "✅ توقفت العجلة! اختر بطاقة من المربعات:";

                const grid = document.getElementById("cardsGrid");
                grid.style.display = "grid";
                generateCards();

                btn.style.display = "none";
            }, 3000);
        }

        function generateCards() {
            const grid = document.getElementById("cardsGrid");
            grid.innerHTML = "";

            for (let i = 0; i < 9; i++) {
                const card = document.createElement("div");
                card.className = "card-item";
                card.innerText = "؟";
                card.onclick = () => revealCard(card, i);
                grid.appendChild(card);
            }
        }

        function revealCard(cardElement, index) {
            if (!canOpen || isOpened) return;

            isOpened = true;
            canOpen = false;

            const randomPrize = prizes[Math.floor(Math.random() * prizes.length)];

            cardElement.classList.add("revealed");
            cardElement.innerText = randomPrize;

            document.getElementById("msgArea").innerText = "🎉 مبروك! لقد ربحت: " + randomPrize;

            // تمييز البطاقات الأخرى
            const allCards = document.querySelectorAll(".card-item");
            allCards.forEach((c, i2) => {
                if (c !== cardElement) {
                    setTimeout(() => {
                        c.style.opacity = "0.3";
                        c.style.cursor = "default";
                    }, 400);
                }
            });

            document.getElementById("resetBtn").style.display = "block";
        }

        function resetGame() {
            hasSpun = false;
            canOpen = false;
            isOpened = false;
            currentRotation = 0;

            const wheel = document.getElementById("wheelContainer");
            wheel.style.transition = "none";
            wheel.style.transform = "rotate(0deg)";

            setTimeout(() => {
                wheel.style.transition = "transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99)";
            }, 50);

            const btn = document.getElementById("spinBtn");
            btn.style.display = "block";
            btn.disabled = false;
            btn.style.opacity = "1";

            document.getElementById("cardsGrid").style.display = "none";
            document.getElementById("cardsGrid").innerHTML = "";
            document.getElementById("msgArea").innerText = "";
            document.getElementById("resetBtn").style.display = "none";
        }
    </script>
</body>
</html>
